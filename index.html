<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus Suporte</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:system-ui;
  background: radial-gradient(circle at top, #0b1220, #050814 70%);
  color:#e5e7eb;
  overflow-x:hidden;
}

/* FUNDO FUTURISTA */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background-image: radial-gradient(rgba(59,130,246,0.15) 1px, transparent 1px);
  background-size: 40px 40px;
  opacity:0.3;
  animation: moveGrid 18s linear infinite;
}

body::after{
  content:"";
  position:fixed;
  inset:-50%;
  background: radial-gradient(circle at 30% 30%, rgba(0,140,255,0.2), transparent 40%),
              radial-gradient(circle at 70% 60%, rgba(120,50,255,0.15), transparent 45%);
  filter: blur(70px);
  animation: glow 12s ease-in-out infinite alternate;
}

/* LAYOUT */
.container{
  display:flex;
  min-height:100vh;
}

/* MENU */
.sidebar{
  width:250px;
  background: rgba(15,23,42,0.6);
  backdrop-filter: blur(12px);
  border-right:1px solid #1e293b;
  padding:20px;
}

.logo{
  font-size:22px;
  font-weight:bold;
  color:#38bdf8;
  margin-bottom:30px;
  text-shadow:0 0 10px #38bdf8;
}

.menu a{
  display:block;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  text-decoration:none;
  color:#cbd5e1;
  transition:0.3s;
}

.menu a:hover{
  background:rgba(56,189,248,0.1);
  color:#38bdf8;
  box-shadow:0 0 15px rgba(56,189,248,0.2);
}

/* MAIN */
.main{
  flex:1;
  padding:30px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:25px;
}

.header h1{
  font-size:24px;
}

button{
  padding:10px 18px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#38bdf8,#6366f1);
  color:white;
  cursor:pointer;
  transition:0.3s;
  box-shadow:0 0 15px rgba(56,189,248,0.3);
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 0 25px rgba(56,189,248,0.6);
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.card{
  background: rgba(15,23,42,0.6);
  border:1px solid #1e293b;
  border-radius:16px;
  padding:20px;
  backdrop-filter: blur(10px);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
  box-shadow:0 0 25px rgba(56,189,248,0.2);
}

.card h3{
  color:#38bdf8;
  margin-bottom:10px;
}

/* SUPORTE */
.suporte{
  margin-top:30px;
  padding:20px;
  border-radius:16px;
  background: rgba(15,23,42,0.6);
  border:1px solid #1e293b;
}

input, textarea{
  width:100%;
  margin-top:10px;
  padding:12px;
  border-radius:10px;
  border:1px solid #334155;
  background:#0b1220;
  color:white;
}

textarea{
  height:120px;
  resize:none;
}

/* ANIMAÇÕES */
@keyframes moveGrid{
  from{transform:translateY(0);}
  to{transform:translateY(-40px);}
}

@keyframes glow{
  0%{transform:translate(0,0);}
  100%{transform:translate(2%,-2%);}
}
</style>
</head>

<body>

<div class="container">

  <div class="sidebar">
    <div class="logo">⚡ NEXUS</div>

    <div class="menu">
      <a href="#">🏠 Dashboard</a>
      <a href="#">📊 Status</a>
      <a href="#">👥 Usuários</a>
      <a href="#">💬 Chamados</a>
      <a href="#">⚙️ Configurações</a>
    </div>
  </div>

  <div class="main">

    <div class="header">
      <h1>Central de Suporte</h1>
      <button onclick="alert('Chamado aberto!')">+ Novo Chamado</button>
    </div>

    <div class="cards">
      <div class="card">
        <h3>Chamados</h3>
        <p>Ativos no sistema: 12</p>
      </div>

      <div class="card">
        <h3>Usuários</h3>
        <p>Online agora: 48</p>
      </div>

      <div class="card">
        <h3>Status</h3>
        <p>Sistema estável</p>
      </div>

      <div class="card">
        <h3>Alertas</h3>
        <p>2 críticos</p>
      </div>
    </div>

    <div class="suporte">
      <h3>🛠 Abrir Chamado</h3>

      <input placeholder="Título do problema">
      <textarea placeholder="Descreva seu problema..."></textarea>

      <button style="margin-top:10px;">Enviar Chamado</button>
    </div>

  </div>

</div>

</body>
</html>
